name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: [self-hosted, Linux, X64]
    outputs:
      go_changed: ${{ steps.detect.outputs.go_changed }}
      web_changed: ${{ steps.detect.outputs.web_changed }}

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 0

      - name: Detect Changed Paths
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_rev="${{ github.event.pull_request.base.sha }}"
          else
            git fetch --no-tags origin main
            base_rev="$(git merge-base origin/main HEAD)"
          fi

          mapfile -t changed_files < <(git diff --name-only "${base_rev}"...HEAD)

          printf 'Comparing against %s\n' "${base_rev}"
          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            printf 'Changed files:\n  (none)\n'
          else
            printf 'Changed files:\n'
            printf '  %s\n' "${changed_files[@]}"
          fi

          go_changed=false
          web_changed=false

          for file in "${changed_files[@]}"; do
            case "${file}" in
              .github/workflows/*)
                go_changed=true
                web_changed=true
                ;;
              *.go|go.mod|go.sum|Makefile|.golangci.yml|.golangci.yaml|api/*)
                go_changed=true
                ;;
              scripts/ci/*)
                go_changed=true
                ;;
              web/*)
                web_changed=true
                ;;
            esac
          done

          printf 'go_changed=%s\n' "${go_changed}" >> "${GITHUB_OUTPUT}"
          printf 'web_changed=%s\n' "${web_changed}" >> "${GITHUB_OUTPUT}"

  api-contract:
    name: API Contract Checks
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5
        with:
          clean: false

      - name: Set Up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set Up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Configure Isolated Go Cache Directories
        run: |
          job_cache_root="${GITHUB_WORKSPACE}/.cache/openase-go/${GITHUB_JOB}"
          echo "OPENASE_GO_CACHE_ROOT=${job_cache_root}" >> "${GITHUB_ENV}"
          echo "GOMODCACHE=${job_cache_root}/pkg/mod" >> "${GITHUB_ENV}"
          echo "GOCACHE=${job_cache_root}/build" >> "${GITHUB_ENV}"

      - name: Prepare Isolated Go Cache Directories
        run: |
          mkdir -p "${OPENASE_GO_CACHE_ROOT}" "${GOMODCACHE}" "${GOCACHE}"

      - name: Configure Go Toolchain
        shell: bash
        run: |
          set -euo pipefail

          cached_go_bin="/home/docker/actions-runner/_work/_tool/go/1.26.1/x64/bin"
          if [[ -d "${cached_go_bin}" ]]; then
            echo "${cached_go_bin}" >> "${GITHUB_PATH}"
          fi

          command -v go
          go version

      - name: Verify Generated OpenAPI Artifacts
        run: make openapi-check

      - name: Audit Frontend API Usage Coverage
        run: make frontend-api-audit-check

  frontend:
    name: Frontend Checks
    runs-on: [self-hosted, Linux, X64]
    needs:
      - changes
      - api-contract
    if: needs.changes.outputs.web_changed == 'true'
    defaults:
      run:
        working-directory: web

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5
        with:
          clean: false

      - name: Set Up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set Up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Reset pnpm Store
        run: |
          store_dir="$(pnpm store path --silent)"
          rm -rf "${store_dir}"

      - name: Remove Frontend Test Artifacts
        run: |
          rm -rf test-results .playwright-artifacts

      - name: Install Web Dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage Playwright System Dependencies
        shell: bash
        run: |
          set -euo pipefail

          if ! command -v apt-get >/dev/null 2>&1 || ! command -v dpkg-deb >/dev/null 2>&1; then
            echo "apt-get and dpkg-deb are required to stage Playwright system dependencies on this runner" >&2
            exit 1
          fi

          choose_package() {
            for candidate in "$@"; do
              candidate_version="$(apt-cache policy "${candidate}" 2>/dev/null | awk '/Candidate:/ { print $2 }')"
              if [[ -n "${candidate_version}" && "${candidate_version}" != "(none)" ]]; then
                printf '%s\n' "${candidate}"
                return 0
              fi
            done
            return 1
          }

          resolve_download_package() {
            local dep="${1%:any}"
            choose_package "${dep}" "${dep}t64"
          }

          packages=(
            "$(choose_package libasound2t64 libasound2)"
            "$(choose_package libatk-bridge2.0-0t64 libatk-bridge2.0-0)"
            "$(choose_package libatk1.0-0t64 libatk1.0-0)"
            "$(choose_package libcups2t64 libcups2)"
            "$(choose_package libatspi2.0-0t64 libatspi2.0-0)"
            libcairo2
            libdbus-1-3
            libdrm2
            libgbm1
            "$(choose_package libglib2.0-0t64 libglib2.0-0)"
            libnspr4
            libnss3
            libpango-1.0-0
            libx11-6
            libxcb1
            libxcomposite1
            libxdamage1
            libxext6
            libxfixes3
            libxkbcommon0
            libxrandr2
            xvfb
            fonts-noto-color-emoji
            fonts-unifont
            libfontconfig1
            libfreetype6
            xfonts-cyrillic
            xfonts-scalable
            fonts-liberation
            fonts-ipafont-gothic
            fonts-wqy-zenhei
            fonts-tlwg-loma-otf
            fonts-freefont-ttf
          )

          mapfile -t packages < <(printf '%s\n' "${packages[@]}" | awk 'NF')
          mapfile -t download_packages < <(
            {
              printf '%s\n' "${packages[@]}"
              apt-cache depends \
                --recurse \
                --no-recommends \
                --no-suggests \
                --no-conflicts \
                --no-breaks \
                --no-replaces \
                --no-enhances \
                "${packages[@]}" 2>/dev/null | awk '/^[[:space:]]*(Pre)?Depends: / { print $2 }'
            } | sed -E 's/^<(.+)>$/\1/' | awk 'NF' | sort -u | while IFS= read -r dep; do
              resolve_download_package "${dep}"
            done | sort -u
          )

          deps_root="${RUNNER_TEMP}/playwright-deps"
          pkg_dir="${deps_root}/packages"
          root_dir="${deps_root}/root"
          rm -rf "${deps_root}"
          mkdir -p "${pkg_dir}" "${root_dir}"

          (
            cd "${pkg_dir}"
            apt-get download "${download_packages[@]}"
          )

          find "${pkg_dir}" -name '*.deb' -print0 | while IFS= read -r -d '' deb; do
            dpkg-deb -x "${deb}" "${root_dir}"
          done

          {
            printf 'LD_LIBRARY_PATH=%s\n' "${root_dir}/usr/lib/x86_64-linux-gnu:${root_dir}/lib/x86_64-linux-gnu:${root_dir}/usr/lib:${LD_LIBRARY_PATH:-}"
            printf 'FONTCONFIG_PATH=%s\n' "${root_dir}/etc/fonts"
            printf 'XDG_DATA_DIRS=%s\n' "${root_dir}/usr/share:${XDG_DATA_DIRS:-/usr/local/share:/usr/share}"
          } >> "${GITHUB_ENV}"

      - name: Install Playwright Browser
        run: pnpm exec playwright install chromium

      - name: Run Web CI
        shell: bash
        run: |
          set -euo pipefail

          if pnpm run ci; then
            exit 0
          fi

          echo "Frontend CI diagnostics:"
          pnpm exec prettier --version || true
          sha256sum src/routes/\(app\)/orgs/+page.svelte || true
          pnpm exec prettier --check src/routes/\(app\)/orgs/+page.svelte || true
          pnpm exec prettier --debug-check src/routes/\(app\)/orgs/+page.svelte || true
          exit 1

      - name: Upload Embedded Web Assets
        uses: actions/upload-artifact@v6
        with:
          name: embedded-web-assets
          path: internal/webui/static
          if-no-files-found: error

  backend:
    name: Backend Checks
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 60
    needs:
      - changes
      - api-contract
      - frontend
    if: |
      always() &&
      needs.changes.result == 'success' &&
      needs['api-contract'].result == 'success' &&
      needs.changes.outputs.go_changed == 'true' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5
        with:
          clean: false

      - name: Download Embedded Web Assets
        if: needs.changes.outputs.web_changed == 'true'
        uses: actions/download-artifact@v7
        with:
          name: embedded-web-assets
          path: internal/webui/static

      - name: Configure Isolated Go Cache Directories
        run: |
          job_cache_root="${GITHUB_WORKSPACE}/.cache/openase-go/${GITHUB_JOB}"
          echo "OPENASE_GO_CACHE_ROOT=${job_cache_root}" >> "${GITHUB_ENV}"
          echo "GOMODCACHE=${job_cache_root}/pkg/mod" >> "${GITHUB_ENV}"
          echo "GOCACHE=${job_cache_root}/build" >> "${GITHUB_ENV}"

      - name: Prepare Isolated Go Cache Directories
        run: |
          mkdir -p "${OPENASE_GO_CACHE_ROOT}" "${GOMODCACHE}" "${GOCACHE}"

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Run Backend Formatting, Tests, And Coverage Gates
        timeout-minutes: 45
        shell: bash
        env:
          OPENASE_GO_TEST_PROGRESS_MODE: plain
        run: |
          set -euo pipefail

          heartbeat_file="${OPENASE_GO_CACHE_ROOT}/backend-check-heartbeat.txt"
          heartbeat_interval_seconds=15

          heartbeat() {
            while true; do
              now="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              printf '%s\n' "${now}" > "${heartbeat_file}"
              printf '[backend-heartbeat] %s make check still running\n' "${now}"
              # Long plain `go test` runs can stay quiet long enough to trip runner watchdogs.
              sleep "${heartbeat_interval_seconds}"
            done
          }

          cleanup() {
            status=$?
            trap - EXIT
            kill "${heartbeat_pid}" 2>/dev/null || true
            wait "${heartbeat_pid}" 2>/dev/null || true

            if [[ -f "${heartbeat_file}" ]]; then
              printf 'Last backend heartbeat: %s\n' "$(cat "${heartbeat_file}")"
            else
              printf 'Last backend heartbeat: unavailable\n'
            fi

            exit "${status}"
          }

          trap cleanup EXIT

          heartbeat &
          heartbeat_pid=$!

          make check

      - name: Build OpenASE Binary
        timeout-minutes: 10
        run: make build

  go-lint:
    name: Go Lint
    runs-on: [self-hosted, Linux, X64]
    needs: changes
    if: needs.changes.outputs.go_changed == 'true'

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 0

      - name: Ensure Embedded Web Placeholder
        run: |
          mkdir -p internal/webui/static
          printf 'lint placeholder for embedded web assets\n' > internal/webui/static/lint-placeholder.txt

      - name: Configure Isolated Go Cache Directories
        run: |
          job_cache_root="${GITHUB_WORKSPACE}/.cache/openase-go/${GITHUB_JOB}"
          echo "OPENASE_GO_CACHE_ROOT=${job_cache_root}" >> "${GITHUB_ENV}"
          echo "GOMODCACHE=${job_cache_root}/pkg/mod" >> "${GITHUB_ENV}"
          echo "GOCACHE=${job_cache_root}/build" >> "${GITHUB_ENV}"

      - name: Prepare Isolated Go Cache Directories
        run: |
          mkdir -p "${OPENASE_GO_CACHE_ROOT}" "${GOMODCACHE}" "${GOCACHE}"

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Fetch Base Branch
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"

      - name: Fetch Main Branch
        if: github.event_name != 'pull_request'
        run: git fetch --no-tags origin main

      - name: Run Incremental Lint
        if: github.event_name == 'pull_request'
        env:
          LINT_BASE_REV: ${{ github.event.pull_request.base.sha }}
        run: make lint

      - name: Run Incremental Lint From Main
        if: github.event_name != 'pull_request'
        run: make lint

      - name: Run Depguard Architecture Checks
        run: make lint-depguard

      - name: Run Repository Architecture Guard
        run: make lint-architecture
