name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: [self-hosted, Linux, X64]
    outputs:
      go_changed: ${{ steps.detect.outputs.go_changed }}
      web_changed: ${{ steps.detect.outputs.web_changed }}

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 0

      - name: Detect Changed Paths
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_rev="${{ github.event.pull_request.base.sha }}"
          else
            git fetch --no-tags origin main
            base_rev="$(git merge-base origin/main HEAD)"
          fi

          mapfile -t changed_files < <(git diff --name-only "${base_rev}"...HEAD)

          printf 'Comparing against %s\n' "${base_rev}"
          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            printf 'Changed files:\n  (none)\n'
          else
            printf 'Changed files:\n'
            printf '  %s\n' "${changed_files[@]}"
          fi

          go_changed=false
          web_changed=false

          for file in "${changed_files[@]}"; do
            case "${file}" in
              .github/workflows/*)
                go_changed=true
                web_changed=true
                ;;
              *.go|go.mod|go.sum|Makefile|.golangci.yml|.golangci.yaml|api/*)
                go_changed=true
                ;;
              scripts/ci/*)
                go_changed=true
                ;;
              web/*)
                web_changed=true
                ;;
            esac
          done

          printf 'go_changed=%s\n' "${go_changed}" >> "${GITHUB_OUTPUT}"
          printf 'web_changed=%s\n' "${web_changed}" >> "${GITHUB_OUTPUT}"

  api-contract:
    name: API Contract Checks
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5
        with:
          clean: false

      - name: Set Up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set Up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Configure Isolated Go Cache Directories
        run: |
          job_cache_root="${RUNNER_TEMP}/openase-go/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}/${GITHUB_JOB}"
          echo "GOMODCACHE=${job_cache_root}/pkg/mod" >> "${GITHUB_ENV}"
          echo "GOCACHE=${job_cache_root}/build" >> "${GITHUB_ENV}"

      - name: Prepare Isolated Go Cache Directories
        run: |
          rm -rf "${GOMODCACHE}" "${GOCACHE}"
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify Generated OpenAPI Artifacts
        run: make openapi-check

  frontend:
    name: Frontend Checks
    runs-on: [self-hosted, Linux, X64]
    needs:
      - changes
      - api-contract
    if: needs.changes.outputs.web_changed == 'true'
    defaults:
      run:
        working-directory: web

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5
        with:
          clean: false

      - name: Set Up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set Up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Reset pnpm Store
        run: |
          store_dir="$(pnpm store path --silent)"
          rm -rf "${store_dir}"

      - name: Install Web Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Web CI
        shell: bash
        run: |
          set -euo pipefail

          if pnpm run ci; then
            exit 0
          fi

          echo "Frontend CI diagnostics:"
          pnpm exec prettier --version || true
          sha256sum src/routes/\(app\)/orgs/+page.svelte || true
          pnpm exec prettier --check src/routes/\(app\)/orgs/+page.svelte || true
          pnpm exec prettier --debug-check src/routes/\(app\)/orgs/+page.svelte || true
          exit 1

      - name: Upload Embedded Web Assets
        uses: actions/upload-artifact@v6
        with:
          name: embedded-web-assets
          path: internal/webui/static
          if-no-files-found: error

  backend:
    name: Backend Checks
    runs-on: [self-hosted, Linux, X64]
    needs:
      - changes
      - api-contract
      - frontend
    if: |
      needs.changes.outputs.go_changed == 'true' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5
        with:
          clean: false

      - name: Download Embedded Web Assets
        if: needs.changes.outputs.web_changed == 'true'
        uses: actions/download-artifact@v7
        with:
          name: embedded-web-assets
          path: internal/webui/static

      - name: Configure Isolated Go Cache Directories
        run: |
          job_cache_root="${RUNNER_TEMP}/openase-go/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}/${GITHUB_JOB}"
          echo "GOMODCACHE=${job_cache_root}/pkg/mod" >> "${GITHUB_ENV}"
          echo "GOCACHE=${job_cache_root}/build" >> "${GITHUB_ENV}"

      - name: Prepare Isolated Go Cache Directories
        run: |
          rm -rf "${GOMODCACHE}" "${GOCACHE}"
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Backend Formatting, Tests, And Coverage Gates
        env:
          OPENASE_GO_TEST_PROGRESS_MODE: plain
        run: make check

      - name: Build OpenASE Binary
        run: make build

  go-lint:
    name: Go Lint
    runs-on: [self-hosted, Linux, X64]
    needs: changes
    if: needs.changes.outputs.go_changed == 'true'

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v5
        with:
          clean: false
          fetch-depth: 0

      - name: Ensure Embedded Web Placeholder
        run: |
          mkdir -p internal/webui/static
          printf 'lint placeholder for embedded web assets\n' > internal/webui/static/lint-placeholder.txt

      - name: Configure Isolated Go Cache Directories
        run: |
          job_cache_root="${RUNNER_TEMP}/openase-go/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}/${GITHUB_JOB}"
          echo "GOMODCACHE=${job_cache_root}/pkg/mod" >> "${GITHUB_ENV}"
          echo "GOCACHE=${job_cache_root}/build" >> "${GITHUB_ENV}"

      - name: Prepare Isolated Go Cache Directories
        run: |
          rm -rf "${GOMODCACHE}" "${GOCACHE}"
          mkdir -p "${GOMODCACHE}" "${GOCACHE}"

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Fetch Base Branch
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"

      - name: Fetch Main Branch
        if: github.event_name != 'pull_request'
        run: git fetch --no-tags origin main

      - name: Run Incremental Lint
        if: github.event_name == 'pull_request'
        env:
          LINT_BASE_REV: ${{ github.event.pull_request.base.sha }}
        run: make lint

      - name: Run Incremental Lint From Main
        if: github.event_name != 'pull_request'
        run: make lint

      - name: Run Depguard Architecture Checks
        run: make lint-depguard

      - name: Run Repository Architecture Guard
        run: make lint-architecture
