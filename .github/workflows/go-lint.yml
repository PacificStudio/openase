name: Go Lint

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Fetch Base Branch
        run: git fetch --no-tags origin main

      - name: Run Incremental Lint
        if: github.event_name == 'pull_request'
        env:
          LINT_BASE_REV: ${{ github.event.pull_request.base.sha }}
        run: make lint

      - name: Run Incremental Lint From Main
        if: github.event_name != 'pull_request'
        run: make lint

      - name: Run Depguard Architecture Checks
        run: make lint-depguard
