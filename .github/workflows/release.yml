name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: Optional git ref to build and publish release assets for, for example v0.1.0.
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || inputs.release_ref || 'main' }}
  cancel-in-progress: false

env:
  PNPM_VERSION: 10.32.1
  RELEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  resolve-release:
    name: Resolve Release Context
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.resolve.outputs.mode }}
      build_ref: ${{ steps.resolve.outputs.build_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}

    steps:
      - name: Resolve Workflow Mode
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          release_ref='${{ inputs.release_ref }}'

          if [[ '${{ github.event_name }}' == 'push' && '${{ github.ref_type }}' == 'tag' ]]; then
            mode='tag'
            build_ref='${{ github.ref_name }}'
            release_tag='${{ github.ref_name }}'
          elif [[ '${{ github.event_name }}' == 'workflow_dispatch' && -n "${release_ref}" ]]; then
            mode='tag'
            build_ref="${release_ref}"
            release_tag="${release_ref}"
          else
            mode='release-please'
            build_ref=''
            release_tag=''
          fi

          printf 'mode=%s\n' "${mode}" >> "${GITHUB_OUTPUT}"
          printf 'build_ref=%s\n' "${build_ref}" >> "${GITHUB_OUTPUT}"
          printf 'release_tag=%s\n' "${release_tag}" >> "${GITHUB_OUTPUT}"

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: resolve-release
    if: needs.resolve-release.outputs.mode == 'release-please'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}

    steps:
      - name: Create Or Update Release PR
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ env.RELEASE_TOKEN }}
          release-type: go
          target-branch: main

  build-embedded-web:
    name: Build Embedded Web Assets
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - release-please
    if: |
      always() &&
      (needs.resolve-release.outputs.mode == 'tag' || needs.release-please.outputs.release_created == 'true') &&
      (needs.release-please.result == 'success' || needs.release-please.result == 'skipped')
    defaults:
      run:
        working-directory: web

    steps:
      - name: Check Out Release Commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-release.outputs.mode == 'tag' && needs.resolve-release.outputs.build_ref || needs.release-please.outputs.sha }}

      - name: Set Up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set Up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install Web Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Embedded Web Assets
        run: pnpm run build

      - name: Upload Embedded Web Assets
        uses: actions/upload-artifact@v6
        with:
          name: embedded-web-assets-release
          path: internal/webui/static
          if-no-files-found: error

  build-binaries:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - release-please
      - build-embedded-web
    if: |
      always() &&
      (needs.resolve-release.outputs.mode == 'tag' || needs.release-please.outputs.release_created == 'true') &&
      needs.build-embedded-web.result == 'success' &&
      (needs.release-please.result == 'success' || needs.release-please.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_format: tar.gz
          - goos: linux
            goarch: arm64
            archive_format: tar.gz
          - goos: darwin
            goarch: amd64
            archive_format: tar.gz
          - goos: darwin
            goarch: arm64
            archive_format: tar.gz
          - goos: windows
            goarch: amd64
            archive_format: zip

    steps:
      - name: Check Out Release Commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-release.outputs.mode == 'tag' && needs.resolve-release.outputs.build_ref || needs.release-please.outputs.sha }}

      - name: Download Embedded Web Assets
        uses: actions/download-artifact@v7
        with:
          name: embedded-web-assets-release
          path: internal/webui/static

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Build Packaged Binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_FORMAT: ${{ matrix.archive_format }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.mode == 'tag' && needs.resolve-release.outputs.release_tag || needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail

          binary_name="openase"
          if [[ "${GOOS}" == "windows" ]]; then
            binary_name="${binary_name}.exe"
          fi

          package_basename="openase_${RELEASE_TAG}_${GOOS}_${GOARCH}"
          package_dir="${RUNNER_TEMP}/${package_basename}"
          archive_path="${RUNNER_TEMP}/${package_basename}.${ARCHIVE_FORMAT}"

          mkdir -p "${package_dir}"

          CGO_ENABLED=0 make build \
            VERSION="${RELEASE_TAG}" \
            OPENASE_BIN="${package_dir}/${binary_name}"

          cp LICENSE README.md "${package_dir}/"

          if [[ "${ARCHIVE_FORMAT}" == "zip" ]]; then
            (
              cd "${RUNNER_TEMP}"
              zip -rq "${archive_path}" "${package_basename}"
            )
          else
            tar -C "${RUNNER_TEMP}" -czf "${archive_path}" "${package_basename}"
          fi

      - name: Upload Release Archive
        uses: actions/upload-artifact@v6
        with:
          name: release-binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ runner.temp }}/openase_${{ needs.resolve-release.outputs.mode == 'tag' && needs.resolve-release.outputs.release_tag || needs.release-please.outputs.tag_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_format }}
          if-no-files-found: error

  build-desktop:
    name: Build Desktop Packages (${{ matrix.label }})
    needs:
      - resolve-release
      - release-please
      - build-embedded-web
    if: |
      always() &&
      (needs.resolve-release.outputs.mode == 'tag' || needs.release-please.outputs.release_created == 'true') &&
      needs.build-embedded-web.result == 'success' &&
      (needs.release-please.result == 'success' || needs.release-please.result == 'skipped')
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            runner: ubuntu-latest
            artifact_name: release-desktop-linux-x64
            file_glob: |
              desktop/dist/packages/*.AppImage
              desktop/dist/packages/*.deb
          - label: macos
            runner: macos-14
            artifact_name: release-desktop-darwin
            file_glob: |
              desktop/dist/packages/*.dmg
              desktop/dist/packages/*.zip
    env:
      RELEASE_TAG: ${{ needs.resolve-release.outputs.mode == 'tag' && needs.resolve-release.outputs.release_tag || needs.release-please.outputs.tag_name }}
      OPENASE_DESKTOP_VERSION: ${{ needs.resolve-release.outputs.mode == 'tag' && needs.resolve-release.outputs.release_tag || needs.release-please.outputs.tag_name }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Check Out Release Commit
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-release.outputs.mode == 'tag' && needs.resolve-release.outputs.build_ref || needs.release-please.outputs.sha }}

      - name: Download Embedded Web Assets
        uses: actions/download-artifact@v7
        with:
          name: embedded-web-assets-release
          path: internal/webui/static

      - name: Set Up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set Up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            desktop/pnpm-lock.yaml
            web/pnpm-lock.yaml

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod

      - name: Install Desktop Dependencies
        run: make desktop-install

      - name: Ensure Electron Binary Is Installed
        run: node desktop/node_modules/electron/install.js

      - name: Configure macOS Signing Mode
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CSC_LINK}" || -z "${CSC_KEY_PASSWORD}" ]]; then
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "${GITHUB_ENV}"
            echo "macOS signing secrets are unavailable; building unsigned desktop release assets."
          else
            echo "macOS signing secrets detected; electron-builder signing is enabled."
          fi

          if [[ -z "${APPLE_ID}" || -z "${APPLE_APP_SPECIFIC_PASSWORD}" || -z "${APPLE_TEAM_ID}" ]]; then
            echo "APPLE_ID=" >> "${GITHUB_ENV}"
            echo "APPLE_APP_SPECIFIC_PASSWORD=" >> "${GITHUB_ENV}"
            echo "APPLE_TEAM_ID=" >> "${GITHUB_ENV}"
            echo "Notarization secrets are unavailable; notarization will be skipped."
          else
            echo "Notarization secrets detected; electron-builder notarization can proceed."
          fi

      - name: Build Desktop Packages
        run: make desktop-package

      - name: Run Desktop Package Smoke Check
        run: make desktop-package-smoke

      - name: Upload Desktop Packages
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.file_glob }}
          if-no-files-found: error

  publish-release:
    name: Publish Release Assets
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - release-please
      - build-binaries
      - build-desktop
    if: |
      always() &&
      (needs.resolve-release.outputs.mode == 'tag' || needs.release-please.outputs.release_created == 'true') &&
      needs.build-binaries.result == 'success' &&
      needs.build-desktop.result == 'success' &&
      (needs.release-please.result == 'success' || needs.release-please.result == 'skipped')

    steps:
      - name: Download Release Archives
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Generate Checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-artifacts
          sha256sum * > checksums.txt

      - name: Prepare Desktop Release Note Addendum
        shell: bash
        run: |
          cat <<'EOF' > "${RUNNER_TEMP}/desktop-release-notes.md"
          ## Desktop installers

          This release ships OpenASE desktop installers alongside the Go archives:

          - macOS: `.dmg`, `.zip`
          - Linux: `.AppImage`, `.deb`

          The desktop packages bundle the Electron host, the OpenASE binary, the desktop bundle manifest, and the starter config template. If macOS signing or notarization secrets are unavailable in CI, the workflow still publishes unsigned desktop assets and logs that downgrade explicitly.
          EOF

      - name: Upload Assets To GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-release.outputs.mode == 'tag' && needs.resolve-release.outputs.release_tag || needs.release-please.outputs.tag_name }}
          append_body: true
          body_path: ${{ runner.temp }}/desktop-release-notes.md
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ env.RELEASE_TOKEN }}
